services:
  zenox-exercise:
    build: .
    container_name: zenox-exercise
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - postgres
      - minio
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: zenox-postgres
    environment:
      POSTGRES_DB: zenox_exercise
      POSTGRES_USER: zenox
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: zenox-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: zenox
      MINIO_ROOT_PASSWORD: zenox-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:
