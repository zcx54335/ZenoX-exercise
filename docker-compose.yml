services:
  zenox-exercise:
    build: .
    container_name: zenox-exercise
    ports:
      - "8080:8080"
    env_file:
      - ./deploy/docker.env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: zenox-postgres
    env_file:
      - ./deploy/docker.env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: zenox-minio
    command: server /data --console-address ":9001"
    env_file:
      - ./deploy/docker.env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: zenox-minio-init
    env_file:
      - ./deploy/docker.env
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "until mc alias set local http://minio:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\"; do sleep 2; done &&
      (mc mb -p \"local/$${S3_BUCKET}\" || true) &&
      mc anonymous set none \"local/$${S3_BUCKET}\""
    restart: "no"

volumes:
  postgres-data:
  minio-data:
